<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Rank Up | Teacher Registration</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/teacherRegister.css') }}"
    >

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

    <div class="header-container">

        <!-- PAGE TITLE -->
        <h1 class="page-title">
            Teacher Registration
        </h1>

        <!-- NAVIGATION -->
        <nav class="navbar">

            <a href="{{ url_for('landing_page') }}">
                Back to Home
            </a>

        </nav>

    </div>

</header>

<!-- ================= MAIN ================= -->

<main class="main">

    <section class="form-container">

        <div class="form-card">

            <!-- FORM HEADER -->
            <div class="form-header">

                <h2>
                    Create Teacher Account
                </h2>

                <p>
                    Register your faculty account to manage
                    student rankings and academic performance.
                </p>

            </div>

            <!-- FLASH MESSAGE -->
            {% if message %}

                {% if category == 'error' %}

                    <p class="error-message">

                        {{ message }}

                    </p>

                {% else %}

                    <p class="success-message">

                        {{ message }}

                    </p>

                {% endif %}

            {% endif %}

            <!-- FORM -->
            <form
                action="{{ url_for('teacher_register') }}"
                method="POST"
                class="register-form"
            >

                <!-- FULL NAME -->
                <div class="input-group">

                    <label for="fullName">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="fullName"
                        name="fullName"
                        placeholder="Enter full name"
                        required
                    >

                </div>

                <!-- DEPARTMENT -->
                <div class="input-group">

                    <label for="department">
                        Department
                    </label>

                    <input
                        type="text"
                        id="department"
                        name="department"
                        placeholder="Enter department"
                        required
                    >

                </div>

                <!-- EMAIL -->
                <div class="input-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter email address"
                        required
                    >

                </div>

                <!-- USERNAME -->
                <div class="input-group">

                    <label for="username">
                        Username
                    </label>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Create username"
                        required
                    >

                </div>

                <!-- PASSWORD -->
                <div class="input-group password-box">

                    <label for="password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create password"
                        required
                    >

                    <button
                        type="button"
                        id="toggleBtn"
                        onclick="togglePassword()"
                    >
                        Show
                    </button>

                </div>

                <!-- SUBMIT BUTTON -->
                <button
                    type="submit"
                    class="btn-submit"
                >

                    Register Account

                </button>

            </form>

            <!-- LOGIN LINK -->
            <p class="bottom-text">

                Already have an account?

                <a href="{{ url_for('teacher_login') }}">
                    Login here
                </a>

            </p>

        </div>

    </section>

</main>

<!-- ================= SCRIPT ================= -->

<script>

function togglePassword(){

    let passwordInput =
        document.getElementById("password");

    let toggleBtn =
        document.getElementById("toggleBtn");

    if(passwordInput.type === "password"){

        passwordInput.type = "text";

        toggleBtn.innerHTML = "Hide";

    } else {

        passwordInput.type = "password";

        toggleBtn.innerHTML = "Show";
    }
}

</script>

</body>
</html>
