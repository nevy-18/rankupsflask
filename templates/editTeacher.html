<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rank Up | Edit Teacher</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/editTeacher.css') }}">
</head>

<body>

<header class="header">
    <div class="header-container">

        <div class="brand-area">
            <h1 class="brand-title"> Student Ranking Management System</h1>
        </div>

        <h1 class="page-title">Edit Teacher</h1>

        <nav>
            <a href="{{ url_for('admin_dashboard') }}" class="back-btn">Back to Home</a>
        </nav>

    </div>
</header>

<main class="container">

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-message">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <section class="form-card">

        <h2>Teacher Information</h2>

        <form action="{{ url_for('edit_teacher', teacher_id=row['teacher_id']) }}" method="POST">

            <input type="hidden" name="teacher_id" value="{{ row['teacher_id'] }}">

            <!-- ID (read-only info) -->
            <div class="form-group">
                <label>Teacher ID</label>
                <input type="text" value="{{ row['teacher_id'] }}" readonly>
            </div>

            <!-- NAME -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" value="{{ row['full_name'] }}" required>
            </div>

            <!-- DEPARTMENT -->
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" value="{{ row['department'] }}" required>
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ row['email'] }}" required>
            </div>

            <!-- USERNAME -->
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" value="{{ row['username'] }}" required>
            </div>

            <!-- PHONE (optional feature) -->
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="Optional">
            </div>

            <!-- STATUS -->
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>

            <!-- ADDRESS -->
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" placeholder="Optional">
            </div>

            <!-- BUTTON -->
            <button type="submit" class="submit-btn">Save Changes</button>

        </form>

    </section>

</main>

</body>
</html>
