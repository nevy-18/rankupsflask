<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rank Up | Edit Subject</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/editSubject.css') }}">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-container">

            <div class="brand-title">
                Student Ranking Management System
            </div>

            <div class="page-title">Edit Subject</div>

            <a class="back-btn" href="{{ url_for('admin_dashboard') }}">
                Back to Home
            </a>

        </div>
    </header>

    <!-- MAIN -->
    <main class="container">

        <div class="form-card">

            <h2>Edit Subject Information</h2>

            <form action="{{ url_for('edit_subject', subject_id=row['subject_id']) }}" method="POST">

                <input type="hidden" name="subject_id" value="{{ row['subject_id'] }}">

                <div class="form-group">
                    <label>Subject Code</label>
                    <input type="text" name="subject_code" value="{{ row['subject_code'] }}" required>
                </div>

                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" name="subject_name" value="{{ row['subject_name'] }}" required>
                </div>

                <div class="form-group">
                    <label>Units</label>
                    <input type="number" name="units" value="{{ row['units'] }}" required>
                </div>

                <div class="form-group">
                    <label>Semester</label>
                    <input type="text" name="semester" value="{{ row['semester'] }}" required>
                </div>

                <div class="form-group">
                    <label>Year Level</label>
                    <input type="text" name="year_level" value="{{ row['year_level'] }}" required>
                </div>

                <div class="form-group">
                    <label>Course</label>
                    <input type="text" name="course" value="{{ row['course'] }}" required>
                </div>

                <button class="submit-btn" type="submit">
                    Update Subject
                </button>

            </form>

        </div>

    </main>

</body>
</html>
