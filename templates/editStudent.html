<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rank Up | Edit Student</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/editStudent.css') }}">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-container">

            <div class="brand-title">
                Student Ranking Management System
            </div>

            <div class="page-title">Edit Student</div>

            <a class="back-btn" href="{{ url_for('admin_dashboard') }}">
                Back to Home
            </a>

        </div>
    </header>

    <!-- MAIN -->
    <main class="container">

        <div class="form-card">

            <h2>Edit Student Information</h2>

            <form action="{{ url_for('edit_student', student_id=row['student_id']) }}" method="POST">

                <input type="hidden" name="student_id" value="{{ row['student_id'] }}">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" value="{{ row['full_name'] }}" required>
                </div>

                <div class="form-group">
                    <label>Course</label>
                    <input type="text" name="course" value="{{ row['course'] }}" required>
                </div>

                <div class="form-group">
                    <label>Year Level</label>
                    <input type="text" name="year_level" value="{{ row['year_level'] }}" required>
                </div>

                <div class="form-group">
                    <label>Section</label>
                    <input type="text" name="section" value="{{ row['section'] }}" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ row['email'] }}" required>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" value="{{ row['username'] }}" required>
                </div>

                <button class="submit-btn" type="submit">
                    Update Student
                </button>

            </form>

        </div>

    </main>

</body>
</html>
